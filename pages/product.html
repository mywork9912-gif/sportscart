<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product - SportsCart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css" /><link rel="stylesheet" href="../css/navbar.css" />
<link rel="stylesheet" href="../css/footer.css" /><link rel="stylesheet" href="../css/cards.css" />
<link rel="stylesheet" href="../css/product.css" /><link rel="stylesheet" href="../css/responsive.css" />
<link rel="stylesheet" href="../css/darkmode.css" />
</head><body>
<div id="navbarMount" data-base="../"></div>
<main class="container page" id="productPage"></main>
<footer class="footer" id="footer" data-base="../"></footer>

<script src="../data/categories.js"></script><script src="../data/brands.js"></script>
<script src="../data/stores.js"></script><script src="../data/offers.js"></script>
<script src="../data/products.js"></script>
<script src="../js/utils.js"></script><script src="../js/darkmode.js"></script>
<script src="../js/favorites.js"></script><script src="../js/compare.js"></script>
<script src="../js/app.js"></script>
<script>
(function(){
  const id=parseInt(new URLSearchParams(location.search).get('id'),10);
  const p=PRODUCTS.find(x=>x.id===id);
  const wrap=document.getElementById('productPage');
  if(!p){wrap.innerHTML='<h1>Product not found</h1><a href="../index.html" class="btn-primary">Home</a>';return;}
  const stars='★'.repeat(Math.round(p.rating))+'☆'.repeat(5-Math.round(p.rating));
  const related=PRODUCTS.filter(x=>x.category===p.category&&x.id!==p.id).slice(0,4);
  wrap.innerHTML=`
    <a href="javascript:history.back()" class="back-link">← Back</a>
    <div class="product-detail">
      <div class="product-gallery">
        <img src="${p.image}" alt="${p.name}" loading="lazy" />
      </div>
      <div class="product-info">
        <span class="brand-tag">${p.brand}</span>
        <h1>${p.name}</h1>
        <div class="rating-row"><span class="stars">${stars}</span> <span class="rev">${p.rating} (${p.reviews} reviews)</span></div>
        <div class="price-big">₹${p.price.toLocaleString()}</div>
        <p class="desc">${p.description||'High-quality '+p.category+' gear from '+p.brand+'.'}</p>
        <div class="cta-row">
          <a href="${p.affiliateLink}" target="_blank" rel="noopener" class="btn-primary">Visit ${p.store} →</a>
          <button class="btn-ghost" onclick="toggleFavorite(${p.id});location.reload()">♥ Favorite</button>
          <button class="btn-ghost" onclick="toggleCompare(${p.id});location.reload()">⇄ Compare</button>
        </div>
        <div class="store-list">
          <h3>Available at</h3>
          <div class="store-row"><span>${p.store}</span><strong>₹${p.price.toLocaleString()}</strong>
          <a href="${p.affiliateLink}" target="_blank" rel="noopener" class="mini-btn">Buy</a></div>
        </div>
      </div>
    </div>
    <section class="section">
      <div class="section-head"><h2>Related Products</h2></div>
      <div class="product-grid">${related.map(r=>renderProductCard(r,'../')).join('')}</div>
    </section>`;
})();
</script>
</body></html>
