<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Categories - SportsCart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css" /><link rel="stylesheet" href="../css/navbar.css" />
<link rel="stylesheet" href="../css/footer.css" /><link rel="stylesheet" href="../css/cards.css" />
<link rel="stylesheet" href="../css/category.css" /><link rel="stylesheet" href="../css/responsive.css" />
<link rel="stylesheet" href="../css/darkmode.css" /></head><body>
<div id="navbarMount" data-base="../"></div>
<main class="container page">
  <h1 id="catTitle">All Products</h1>
  <div class="filter-bar">
    <select id="filterCat"><option value="">All Categories</option></select>
    <select id="filterBrand"><option value="">All Brands</option></select>
    <select id="filterStore"><option value="">All Stores</option></select>
    <select id="filterSort">
      <option value="popular">Popular</option>
      <option value="low">Price: Low to High</option>
      <option value="high">Price: High to Low</option>
      <option value="rating">Top Rated</option>
    </select>
  </div>
  <div class="product-grid" id="catGrid"></div>
  <p id="emptyMsg" class="empty-msg" hidden>No products match these filters.</p>
</main>
<footer class="footer" id="footer" data-base="../"></footer>

<script src="../data/categories.js"></script><script src="../data/brands.js"></script>
<script src="../data/stores.js"></script><script src="../data/products.js"></script>
<script src="../js/utils.js"></script><script src="../js/darkmode.js"></script>
<script src="../js/favorites.js"></script><script src="../js/compare.js"></script>
<script src="../js/filter.js"></script><script src="../js/category.js"></script>
<script src="../js/app.js"></script>
</body></html>
