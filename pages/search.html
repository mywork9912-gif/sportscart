<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Search - SportsCart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css" /><link rel="stylesheet" href="../css/navbar.css" />
<link rel="stylesheet" href="../css/footer.css" /><link rel="stylesheet" href="../css/cards.css" />
<link rel="stylesheet" href="../css/responsive.css" /><link rel="stylesheet" href="../css/darkmode.css" />
</head><body>
<div id="navbarMount" data-base="../"></div>
<main class="container page">
  <h1>Search</h1>
  <input type="text" id="pageSearch" class="page-search" placeholder="Search products, brands, categories, stores…" />
  <div class="product-grid" id="searchGrid"></div>
  <p id="searchEmpty" class="empty-msg" hidden>No products found.</p>
</main>
<footer class="footer" id="footer" data-base="../"></footer>
<script src="../data/categories.js"></script><script src="../data/stores.js"></script>
<script src="../data/products.js"></script><script src="../js/utils.js"></script>
<script src="../js/darkmode.js"></script><script src="../js/favorites.js"></script>
<script src="../js/compare.js"></script><script src="../js/app.js"></script>
<script>
const initQ=new URLSearchParams(location.search).get('q')||'';
const input=document.getElementById('pageSearch'); input.value=initQ;
function run(){
  const q=input.value.trim().toLowerCase();
  const list=q?PRODUCTS.filter(p=>[p.name,p.brand,p.category,p.store].join(' ').toLowerCase().includes(q)):PRODUCTS;
  document.getElementById('searchGrid').innerHTML=list.map(p=>renderProductCard(p,'../')).join('');
  document.getElementById('searchEmpty').hidden=list.length>0;
}
input.addEventListener('input',run); run();
</script>
</body></html>
