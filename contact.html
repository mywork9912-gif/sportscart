<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact - SportsCart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/navbar.css" />
<link rel="stylesheet" href="css/footer.css" /><link rel="stylesheet" href="css/responsive.css" />
<link rel="stylesheet" href="css/darkmode.css" />
</head>
<body>
<div id="navbarMount"></div>
<main class="container page">
  <h1>Contact Us</h1>
  <p class="lead">Questions, partnership requests, or feedback? We'd love to hear from you.</p>
  <form id="contactForm" class="contact-form">
    <label>Name<input type="text" required /></label>
    <label>Email<input type="email" required /></label>
    <label>Message<textarea rows="6" required></textarea></label>
    <button type="submit" class="btn-primary">Send Message</button>
    <p class="form-msg" id="contactMsg"></p>
  </form>
</main>
<footer class="footer" id="footer"></footer>
<script src="data/categories.js"></script><script src="data/stores.js"></script>
<script src="data/products.js"></script><script src="js/utils.js"></script>
<script src="js/darkmode.js"></script><script src="js/favorites.js"></script>
<script src="js/compare.js"></script><script src="js/app.js"></script>
<script>
document.getElementById('contactForm').addEventListener('submit',e=>{
  e.preventDefault();
  document.getElementById('contactMsg').textContent='✅ Thanks! We\'ll get back to you soon.';
  e.target.reset();
});
</script>
</body></html>
